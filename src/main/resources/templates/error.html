<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — AuthForge</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .status-code { font-size: 4rem; font-weight: 700; color: #7c3aed; }
        h2 { font-size: 1.25rem; margin: 0.75rem 0; color: #e2e8f0; }
        p  { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.95rem; }
        a  { color: #7c3aed; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="status-code" th:text="${status ?: 500}">500</div>
    <h2 th:text="${error ?: 'Internal Server Error'}">Internal Server Error</h2>
    <p th:text="${message ?: 'An unexpected error occurred. Please try again.'}">
        An unexpected error occurred. Please try again.
    </p>
    <a href="/">Go to Homepage</a>
</div>
</body>
</html>
