<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Register — ' + ${realm}">Register — AuthForge</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1d2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
        }

        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { font-size: 1.75rem; font-weight: 700; color: #7c3aed; }
        .logo p   { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

        label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 6px; }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            padding: 0.625rem 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #7c3aed; }

        .field         { margin-bottom: 1.1rem; }
        .field-row     { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }

        .btn {
            width: 100%;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.25rem;
        }
        .btn:hover { background: #6d28d9; }

        .footer-links {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        .footer-links a { color: #7c3aed; text-decoration: none; }

        .error-msg {
            background: #450a0a;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }

        .success-msg {
            background: #052e16;
            border: 1px solid #166534;
            border-radius: 8px;
            color: #86efac;
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>AuthForge</h1>
        <p>Create your account</p>
    </div>

    <div class="error-msg"   th:if="${error}"   th:text="${error}"></div>
    <div class="success-msg" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{'/realms/' + ${realm} + '/register'}" method="post">
        <input type="hidden" name="redirect_uri" th:value="${redirectUri}"/>

        <div class="field-row">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" placeholder="First"/>
            </div>
            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" placeholder="Last"/>
            </div>
        </div>

        <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username"
                   placeholder="Choose a username" required/>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email"
                   placeholder="your@email.com" required/>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password"
                   placeholder="At least 8 characters" required minlength="8"/>
        </div>

        <button class="btn" type="submit">Create Account</button>
    </form>

    <div class="footer-links">
        Already have an account?
        <a th:href="@{/login(realm=${realm},redirect_uri=${redirectUri})}">Sign In</a>
    </div>
</div>
</body>
</html>
